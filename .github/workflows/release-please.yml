name: release-please

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Maintains a release PR that bumps the version + CHANGELOG from
      # Conventional Commits, and on merge tags the release (vX.Y.Z) and
      # creates a GitHub Release. Also bumps the version in
      # .claude-plugin/plugin.json and marketplace.json (see release-please-config.json).
      # State: .release-please-manifest.json.
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
