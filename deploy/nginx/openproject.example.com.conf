# Reverse proxy for self-hosted OpenProject → 127.0.0.1:8080
# Standard certbot-managed nginx vhost (HTTP→HTTPS via Let's Encrypt).
#
# Install (as ROOT — the claude-openproject-ops agent has no sudo):
#   cp deploy/nginx/openproject.example.com.conf /etc/nginx/sites-available/openproject
#   ln -s /etc/nginx/sites-available/openproject /etc/nginx/sites-enabled/openproject
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d openproject.example.com   # adds TLS + :80→:443 redirect
#
# Prereqs:
#   1. DNS A/AAAA record  openproject.example.com → YOUR_SERVER_IP
#   2. OpenProject .env set to match this hostname + HTTPS termination at nginx:
#        OPENPROJECT_HOST__NAME=openproject.example.com
#        OPENPROJECT_HTTPS=true
#      (re-run: OP_HOST=openproject.example.com OP_HTTPS=true bash scripts/setup.sh)
#   3. Change the default admin/admin password BEFORE the instance is reachable publicly.

server {
    listen 80;
    listen [::]:80;
    server_name openproject.example.com;
    # certbot will convert this to a 301→https redirect after issuing the cert
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name openproject.example.com;

    # --- TLS: filled in by `certbot --nginx` (Let's Encrypt) ---
    # ssl_certificate     /etc/letsencrypt/live/openproject.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/openproject.example.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # OpenProject attachments can be large; raise from nginx's 1m default.
    client_max_body_size 256m;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        # Host MUST match OPENPROJECT_HOST__NAME or OpenProject returns "Invalid host_name".
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # TLS terminates here; tell OpenProject (OPENPROJECT_HTTPS=true) the original scheme.
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSockets for collaborative editing (hocuspocus) + live updates.
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
